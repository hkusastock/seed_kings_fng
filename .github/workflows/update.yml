name: Update CNN Fear Greed Pine Seed

on:
  schedule:
    - cron: "30 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update CNN Fear & Greed data
        run: python scripts/update_fgi.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/CNN_FGI.csv

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update CNN Fear & Greed data"
            git push
          fi
